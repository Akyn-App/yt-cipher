openapi: 3.0.0
info:
  title: yt-cipher API
  description: A web service for solving YouTube's cipher challenges.
  version: 1.0.0
servers:
  - url: /
paths:
  /decrypt_signature:
    post:
      summary: Decrypts a signature
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                encrypted_signature:
                  type: string
                n_param:
                  type: string
                player_url:
                  type: string
      responses:
        '200':
          description: Decrypted signature
          content:
            application/json:
              schema:
                type: object
                properties:
                  decrypted_signature:
                    type: string
                  decrypted_n_sig:
                    type: string
  /get_sts:
    post:
      summary: Gets a Short-Term Secret (STS)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                player_url:
                  type: string
      responses:
        '200':
          description: STS value
          content:
            application/json:
              schema:
                type: object
                properties:
                  sts:
                    type: string
  /resolve_url:
    post:
      summary: Resolves a URL
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                stream_url:
                  type: string
                player_url:
                  type: string
                encrypted_signature:
                  type: string
                signature_key:
                  type: string
                n_param:
                  type: string
      responses:
        '200':
          description: Resolved URL
          content:
            application/json:
              schema:
                type: object
                properties:
                  resolved_url:
                    type: string
  /get_po_token:
    post:
      summary: Generates a YouTube Proof of Origin (PO) token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                visitorData:
                  type: string
                  description: YouTube visitor data string. Auto-generated if omitted.
                videoId:
                  type: string
                  description: Optional video ID to generate a video-bound token.
                client:
                  type: string
                  description: Client type (e.g., IOS, ANDROID). Affects video token binding.
      responses:
        '200':
          description: Generated PO token
          content:
            application/json:
              schema:
                type: object
                properties:
                  visitorDataToken:
                    type: string
                  visitorData:
                    type: string
                  videoIdToken:
                    type: string
                  expiresAt:
                    type: string
                    format: date-time